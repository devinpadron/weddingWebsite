<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Samantha &amp; Devin · Save the Date</title>
  <link rel="stylesheet" href="../gate.css"/>
  <script>
    try {
      if (localStorage.getItem('wedding_invited_v1') === '1') {
        document.documentElement.classList.add('gate-unlocked');
      }
    } catch (e) {}
  </script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#faf4ec; -webkit-font-smoothing:antialiased; }

    .screen {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:52px 24px;
      position:absolute; inset:0;
      transition:opacity 0.85s ease, transform 0.85s ease;
    }
    .screen.hidden { opacity:0; pointer-events:none; transform:translateY(10px); }

    .landing-wrap, .splash-wrap {
      width:100%; max-width:460px;
      display:flex; flex-direction:column; align-items:center;
      opacity:0; transform:translateY(20px);
      animation:riseIn 1.1s .05s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes riseIn { to { opacity:1; transform:translateY(0); } }
    .hw-image { width:100%; max-width:460px; display:block; }

    #grandparent-img { transition: opacity 0.85s ease; }
    #grandparent-img.fading { opacity: 0; }

    .splash-next {
      margin-top: 56px;
      background: transparent;
      border: 0.5px solid #c9a87a;
      border-radius: 999px;
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #6b5a47;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.85s ease, border-color 0.3s, color 0.3s, transform 0.2s;
    }
    .splash-next.visible { opacity: 1; pointer-events: auto; }
    .splash-next:hover { border-color: #3a2a1f; color: #3a2a1f; }
    .splash-next:active { transform: scale(0.96); }
    .splash-next .arrow { display: inline-block; transition: transform 0.3s; }
    .splash-next:hover .arrow { transform: translateX(3px); }
  </style>
</head>
<body>

<div id="passcode-gate">
  <span class="lock-eyebrow">A private invitation</span>
  <!-- <img class="lock-names-img" src="../names.png" alt="Devin &amp; Samantha"/> -->
  <div class="lock-rule"></div>
  <p class="lock-prompt">Enter password</p>
  <div class="text-input-wrap">
    <input class="pw-input" type="password" placeholder="password" autocomplete="off" spellcheck="false"/>
    <button class="pw-submit">Enter</button>
  </div>
  <p class="error-msg invisible">Try again</p>
</div>

<div id="page-content">
  <div id="splash-screen" class="screen hidden">
    <div class="splash-wrap">
      <img class="hw-image" src="splash-message.png" alt="A handwritten note"/>
      <button class="splash-next" id="splash-next" type="button" aria-label="Continue">
        <svg class="arrow" viewBox="0 0 48 24" width="30" height="16" fill="none"
             stroke="currentColor" stroke-width="2.4" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M4 12.6 C 14 11.8, 28 13.1, 42 12"/>
          <path d="M33.5 6 C 37 8.6, 40 10.6, 42 12 C 40 13.6, 37 15.8, 33.8 18.4"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="landing-screen" class="screen hidden">
    <div class="landing-wrap">
      <img class="hw-image" id="grandparent-img"
           alt="You are invited — Devin &amp; Samantha, June 1–4 2027, Umbria Italy"/>
    </div>
  </div>
</div>

<script src="../gate.js" defer></script>
<script>
  (function () {
    const GRANDPARENT_IMAGES = ['Gentile.png', 'Heffernan.png'];
    const NEXT_REVEAL_MS  = 2000;
    const LETTER_HOLD_MS  = 6000;
    const FADE_MS         = 850;

    // Preload so cross-fading doesn't flash blank while the src swaps.
    GRANDPARENT_IMAGES.forEach(src => { const i = new Image(); i.src = src; });

    function startSequence() {
      const sScreen  = document.getElementById('splash-screen');
      const lScreen  = document.getElementById('landing-screen');
      const gImg     = document.getElementById('grandparent-img');
      const nextBtn  = document.getElementById('splash-next');

      sScreen.classList.remove('hidden');

      setTimeout(() => nextBtn.classList.add('visible'), NEXT_REVEAL_MS);

      nextBtn.addEventListener('click', () => {
        const initial = GRANDPARENT_IMAGES[Math.floor(Math.random() * GRANDPARENT_IMAGES.length)];
        gImg.src = initial;
        sScreen.classList.add('hidden');
        lScreen.classList.remove('hidden');
        startCycle(gImg, initial);
      }, { once: true });
    }

    function startCycle(img, initialSrc) {
      const others = GRANDPARENT_IMAGES.filter(s => s !== initialSrc);
      const sequence = [...others, initialSrc];
      let idx = 0;

      function tick() {
        setTimeout(() => {
          const target = sequence[idx % sequence.length];
          idx++;
          fadeSwap(img, target, tick);
        }, LETTER_HOLD_MS);
      }
      tick();
    }

    function fadeSwap(img, newSrc, done) {
      img.classList.add('fading');
      setTimeout(() => {
        img.src = newSrc;
        img.classList.remove('fading');
        setTimeout(done, FADE_MS);
      }, FADE_MS);
    }

    function onReady(fn) {
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', fn);
      } else {
        fn();
      }
    }

    if (document.documentElement.classList.contains('gate-unlocked')) {
      onReady(startSequence);
    } else {
      document.addEventListener('gate:unlocking', startSequence);
    }
  })();
</script>
</body>
</html>
