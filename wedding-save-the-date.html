<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Samantha & Devin</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#faf4ec; -webkit-font-smoothing:antialiased; }

    .screen {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:52px 24px;
      position:absolute; inset:0;
      transition:opacity 0.85s ease, transform 0.85s ease;
    }
    .screen.hidden { opacity:0; pointer-events:none; transform:translateY(10px); }

    /* ── PASSCODE ── */
    .lock-eyebrow {
      font-family:'EB Garamond',Georgia,serif; font-style:italic;
      font-size:13px; letter-spacing:0.24em;
      text-transform:uppercase; display:block;
      text-align:center; margin-bottom:5px;
    }

    .lock-names-img {
      width: min(320px, 84vw);
      display: block;
      margin: 0 auto;
      opacity: 0.92;
    }

    .lock-rule { width:36px; height:1px; background:#c9a87a; margin:22px auto 30px; }

    .lock-prompt {
      font-family:'EB Garamond',Georgia,serif; font-style:italic;
      font-size:13px; letter-spacing:0.22em; color:#9a7f6a;
      text-transform:uppercase; margin-bottom:20px; text-align:center;
    }

    /* Text input instead of keypad */
    .text-input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 280px;
    }

    .pw-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #e3d3b8;
      outline: none;
      background: transparent;
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: 22px;
      color: #3a2a1f;
      text-align: center;
      letter-spacing: 0.12em;
      padding: 6px 0 8px;
      transition: border-color 0.2s;
    }
    .pw-input::placeholder {
      color: #d8c5a8;
      letter-spacing: 0.08em;
      font-size: 18px;
    }
    .pw-input:focus { border-bottom-color: #c9a87a; }

    .pw-submit {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a6f5e;
      background: transparent;
      border: 1px solid #d4bf9c;
      border-radius: 40px;
      padding: 9px 28px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .pw-submit:hover { border-color: #c9a87a; color: #000000; }
    .pw-submit:active { transform: scale(0.97); }

    .error-msg {
      margin-top: 12px;
      font-family:'EB Garamond',Georgia,serif; font-style:italic;
      font-size:14px; color:#b04a3a; text-align:center;
      min-height:20px; transition:opacity .3s; letter-spacing:0.04em;
    }
    .error-msg.invisible { opacity:0; }

    @keyframes shake {
      0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}
      40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
    }
    .shake { animation:shake .42s ease; }

    /* ── LANDING ── */
    #landing-screen { background:#faf4ec; }

    .landing-wrap, .splash-wrap {
      width:100%; max-width:460px;
      display:flex; flex-direction:column; align-items:center;
      opacity:0; transform:translateY(20px);
      animation:riseIn 1.1s .05s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes riseIn { to { opacity:1; transform:translateY(0); } }
    .hw-image { width:100%; max-width:460px; display:block; }
  </style>
</head>
<body>

<div id="passcode-screen" class="screen">
  <span class="lock-eyebrow">a private invitation</span>

  <div class="lock-rule"></div>
  <p class="lock-prompt">enter password</p>

  <div class="text-input-wrap">
    <input
      class="pw-input"
      id="pw-input"
      type="password"
      placeholder="password"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="pw-submit" id="pw-submit">enter</button>
  </div>

  <p class="error-msg invisible" id="error-msg">try again</p>
</div>

<div id="splash-screen" class="screen hidden">
  <div class="splash-wrap">
    <img class="hw-image" src="splash-message.png" alt="A handwritten note"/>
  </div>
</div>

<div id="landing-screen" class="screen hidden">
  <div class="landing-wrap">
    <img class="hw-image" id="grandparent-img"
         alt="You are invited — Devin &amp; Samantha, June 1–4 2027, Umbria Italy"/>
  </div>
</div>

<script>
  const PASSCODE_HASH = 'ebaa43867e8df5f72ccc6ad4a83b841df1d92eed05475f4c21f3bc65cd9d876b';
  const pScreen = document.getElementById('passcode-screen');
  const sScreen = document.getElementById('splash-screen');
  const lScreen = document.getElementById('landing-screen');
  const errMsg  = document.getElementById('error-msg');
  const input   = document.getElementById('pw-input');
  const submit  = document.getElementById('pw-submit');
  const gImg    = document.getElementById('grandparent-img');

  // Replace each entry with the real grandparent-note filename once added.
  const GRANDPARENT_IMAGES = ['Gentile.png', 'Gentile.png', 'Gentile.png'];
  const SPLASH_HOLD_MS = 4500;

  async function sha256Hex(text){
    const buf = new TextEncoder().encode(text);
    const hashBuf = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hashBuf))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function tryUnlock(){
    const val = input.value.trim().toLowerCase();
    const hash = await sha256Hex(val);
    if(hash === PASSCODE_HASH){
      pScreen.classList.add('hidden');
      sScreen.classList.remove('hidden');
      setTimeout(() => {
        const pick = GRANDPARENT_IMAGES[Math.floor(Math.random() * GRANDPARENT_IMAGES.length)];
        gImg.src = pick;
        sScreen.classList.add('hidden');
        lScreen.classList.remove('hidden');
      }, SPLASH_HOLD_MS);
    } else {
      errMsg.classList.remove('invisible');
      input.classList.remove('shake'); void input.offsetWidth; input.classList.add('shake');
      input.value = '';
      setTimeout(() => errMsg.classList.add('invisible'), 2000);
    }
  }

  submit.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter') tryUnlock();
  });

  // Focus input on load
  input.focus();
</script>
