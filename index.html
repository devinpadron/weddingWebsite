<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Devin &amp; Samantha · June 2027 · Umbria, Italy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="gate.css">
<script>
  try {
    if (localStorage.getItem('wedding_invited_v1') === '1') {
      document.documentElement.classList.add('gate-unlocked');
    }
  } catch (e) {}
</script>
<style>
  :root {
    --parchment: #F5F0E8;
    --espresso: #2C2A25;
    --travertine: #B8A98C;
    --umber: #7A6E5A;
    --gold: #C8B89A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--parchment);
    color: var(--espresso);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--gold); color: var(--espresso); }

  .serif        { font-family: 'Cormorant Garamond', serif; font-weight: 300; }
  .serif-italic { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; }
  .micro {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 400;
    color: var(--umber);
  }
  .small-caps {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .placeholder-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }
  .placeholder-inner {
    text-align: center;
    max-width: 640px;
    width: 100%;
    opacity: 0;
    transform: translateY(14px);
    animation: ph-rise 1.1s 0.1s cubic-bezier(.2,.6,.2,1) forwards;
  }
  @keyframes ph-rise { to { opacity: 1; transform: none; } }

  .placeholder-rule {
    width: 36px;
    height: 0.5px;
    background: var(--travertine);
    margin: 28px auto;
  }
  .placeholder-message {
    font-size: clamp(34px, 5.4vw, 56px);
    margin: 0;
    font-weight: 300;
    color: var(--espresso);
    line-height: 1.2;
    text-wrap: balance;
  }
  .placeholder-meta {
    color: var(--umber);
    letter-spacing: 0.32em;
    margin: 0;
  }
  .placeholder-link {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-top: 56px;
    color: var(--espresso);
    border-bottom: 0.5px solid var(--travertine);
    padding: 0 2px 8px;
    transition: border-color 0.3s, color 0.3s;
  }
  .placeholder-link:hover { border-color: var(--espresso); }
  .placeholder-link .arrow {
    font-size: 14px;
    line-height: 1;
    transition: transform 0.3s;
  }
  .placeholder-link:hover .arrow { transform: translateX(4px); }
</style>
</head>
<body>

<div id="passcode-gate">
  <span class="lock-eyebrow">a private invitation</span>
  <!-- <img class="lock-names-img" src="names.png" alt="Devin &amp; Samantha"/> -->
  <div class="lock-rule"></div>
  <p class="lock-prompt">enter password</p>
  <div class="text-input-wrap">
    <input class="pw-input" type="password" placeholder="password" autocomplete="off" spellcheck="false"/>
    <button class="pw-submit">enter</button>
  </div>
  <p class="error-msg invisible">try again</p>
</div>

<div id="page-content">
  <main class="placeholder-screen">
    <div class="placeholder-inner">
      <span class="micro">D &amp; S · 06 · 02 · 2027</span>
      <div class="placeholder-rule"></div>
      <h1 class="serif-italic placeholder-message">
        More information to come
      </h1>
      <div class="placeholder-rule"></div>
      <p class="small-caps placeholder-meta">
        1 — 4 June 2027 · Umbria, Italy
      </p>
      <a href="savethedate/" class="placeholder-link small-caps">
        Save the date
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    </div>
  </main>
</div>

<script src="gate.js" defer></script>

</body>
</html>
